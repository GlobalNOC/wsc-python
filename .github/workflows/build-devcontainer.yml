---
name: Build and Publish Dev Container

on:
  # Re-run when devcontainer-related files change on main
  push:
    branches:
      - main
    paths:
      - .devcontainer/Dockerfile
      - .devcontainer/prompt.sh
      - .github/workflows/build-devcontainer.yml

  # Rebuild monthly to pick up base-image security patches
  schedule:
    - cron: "0 4 1 * *" # 1st of every month at 04:00 UTC

  # Allow manual runs
  workflow_dispatch:

env:
  REGISTRY: containers.github.grnoc.iu.edu
  IMAGE_NAME: wsc-python-devc

jobs:
  build-and-push:
    name: Build and push devcontainer image
    runs-on: self-hosted

    # Minimal token permissions — write only what we need
    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out this repository
      # -----------------------------------------------------------------------
      - name: Check out repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Authenticate with the GHE container registry
      # -----------------------------------------------------------------------
      - name: Log in to GHE container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # 3. Generate image tags and OCI labels
      # -----------------------------------------------------------------------
      - name: Normalize image owner to lowercase
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=schedule,pattern={{date 'YYYYMMDD'}}
            type=sha,prefix=sha-,format=short

      # -----------------------------------------------------------------------
      # 4. Build and push
      #    Build context is the repo root — required by the Dockerfile's COPY.
      # -----------------------------------------------------------------------
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
